name: Build & validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Deploys (production + preview) are now owned by the Cloudflare Pages
# project's own Git Integration build — see the project config:
#   build_command:   npm run build && node scripts/validate-build.mjs
#   destination_dir: _site
#   NODE_VERSION:    20 (both envs)
#   SKIP_INDEXNOW:   1 (preview only; production pings as before)
# CF auto-builds every push, deploys main → apex and PR branches →
# <slug>.the-symbiotic-mind.pages.dev. CF's build_command runs validate-
# build.mjs too, so a failing validator blocks the deploy directly.
# This workflow stays as a parallel/shadow gate (same build chain) so
# branch-protection still has a GitHub Check to require on PRs and so
# any CF-vs-GHA env drift surfaces as a failure here.

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build site
        run: npm run build

      - name: Validate build outputs
        run: node scripts/validate-build.mjs
